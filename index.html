<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="LineageOS for Redmi Note 11 / NFC" />
  <meta name="theme-color" content="#07090f" />
  <title>LineageOS | spes</title>
  <link rel="icon" type="image/png" href="src/favicon.png?v=3" />
  <link rel="shortcut icon" href="src/favicon.png?v=3" />
  <link rel="apple-touch-icon" href="src/favicon.png?v=3" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet" />
  <style>
    /* ── Reset & base ── */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    html {
      scroll-behavior: smooth;
      scroll-padding-top: 64px
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #07090f;
      color: #dde4f0;
      line-height: 1.65;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    img {
      display: block;
      max-width: 100%
    }

    a {
      color: #60a5fa;
      text-decoration: none;
      transition: color .15s
    }

    a:hover {
      color: #93c5fd
    }

    button {
      cursor: pointer;
      font-family: inherit
    }

    /* ── Tokens ── */
    :root {
      --bg: #07090f;
      --s0: #0c0f1a;
      --s1: #111827;
      --s2: #1a2236;
      --bd: #1e2d45;
      --bdhi: #2d4470;
      --a1: #3b82f6;
      --a2: #8b5cf6;
      --grad: linear-gradient(120deg, #3b82f6 0%, #8b5cf6 100%);
      --glo: rgba(59, 130, 246, .08);
      --grn: #10b981;
      --ylw: #f59e0b;
      --txt: #dde4f0;
      --sub: #8a9ab8;
      --mut: #4a5c78;
      --mono: 'JetBrains Mono', monospace;
      --r: 10px;
      --rl: 16px;
      --rxl: 22px;
    }

    /* ── Background glow ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: -1;
      background:
        radial-gradient(ellipse 80% 55% at 50% -10%, rgba(59, 130, 246, .07) 0%, transparent 65%),
        radial-gradient(ellipse 55% 40% at 95% 40%, rgba(139, 92, 246, .05) 0%, transparent 60%);
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar {
      width: 4px
    }

    ::-webkit-scrollbar-track {
      background: var(--bg)
    }

    ::-webkit-scrollbar-thumb {
      background: var(--bdhi);
      border-radius: 4px
    }

    /* ── Progress bar ── */
    .progress {
      position: fixed;
      top: 0;
      left: 0;
      height: 2px;
      z-index: 999;
      width: 0;
      background: var(--grad)
    }

    /* ── Layout ── */
    .wrap {
      width: 100%;
      max-width: 1080px;
      margin-inline: auto;
      padding-inline: 1.5rem
    }

    .sec {
      padding-block: 3.75rem
    }

    .sec+.sec {
      border-top: 1px solid var(--bd)
    }

    /* ── Header ── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(7, 9, 15, .82);
      backdrop-filter: blur(20px) saturate(1.6);
      -webkit-backdrop-filter: blur(20px) saturate(1.6);
      border-bottom: 1px solid var(--bd);
    }

    .hdr {
      display: flex;
      align-items: center;
      height: 60px;
      gap: 2rem
    }

    /* Logo: "LineageOS | Redmi Note 11 / NFC" plain text */
    .logo {
      display: flex;
      align-items: center;
      gap: .6rem;
      font-weight: 700;
      font-size: .9rem;
      color: var(--txt);
      flex-shrink: 0;
    }

    .logo:hover {
      color: var(--txt)
    }

    .logo-img {
      width: 22px;
      height: 22px;
      object-fit: contain;
      filter: drop-shadow(0 0 8px rgba(59, 130, 246, 0.3));
    }

    .logo-sep {
      color: var(--bdhi);
      font-weight: 300;
      font-size: 1.1rem;
      line-height: 1;
      user-select: none;
    }

    .logo-device {
      color: var(--sub);
      font-weight: 500;
      font-size: .85rem
    }

    /* Desktop nav */
    nav.desk {
      display: flex;
      margin-left: auto;
      gap: .15rem
    }

    nav.desk a {
      font-size: .78rem;
      font-weight: 500;
      color: var(--mut);
      padding: 5px 10px;
      border-radius: 6px;
      transition: all .15s;
      letter-spacing: .01em;
    }

    nav.desk a:hover {
      color: var(--txt);
      background: var(--s2)
    }

    /* Hamburger */
    .ham {
      display: flex;
      flex-direction: column;
      gap: 4px;
      background: none;
      border: none;
      padding: 8px;
      margin-left: auto;
      cursor: pointer;
    }

    .ham span {
      width: 20px;
      height: 2px;
      background: var(--sub);
      border-radius: 2px;
      transition: transform .25s, opacity .25s, background .25s;
    }

    .ham:hover span {
      background: var(--txt);
    }

    .ham.open span:nth-child(1) {
      transform: translateY(6px) rotate(45deg)
    }

    .ham.open span:nth-child(2) {
      opacity: 0
    }

    .ham.open span:nth-child(3) {
      transform: translateY(-6px) rotate(-45deg)
    }

    /* Mobile/Unified nav drawer */
    nav.mob {
      display: flex;
      flex-direction: column;
      background: var(--s0);
      border-top: 1px solid var(--bd);
      padding-inline: 1.5rem;
      max-height: 0;
      overflow: hidden;
      opacity: 0;
      transition: max-height .4s cubic-bezier(0.4, 0, 0.2, 1), opacity .3s ease, padding .4s ease;
    }

    nav.mob.open {
      max-height: 400px;
      opacity: 1;
      padding-block: .4rem .75rem;
    }

    nav.mob a {
      font-size: .88rem;
      font-weight: 500;
      color: var(--sub);
      padding: 10px 0;
      border-bottom: 1px solid var(--bd);
      transition: color .15s;
    }

    nav.mob a:last-child {
      border-bottom: none
    }

    nav.mob a:hover {
      color: var(--txt)
    }

    /* ── Section headings ── */
    .sh {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 1.25rem
    }

    h2 {
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: -.02em;
      color: var(--txt);
      margin-bottom: 1.25rem;
      display: flex;
      align-items: center;
      gap: .6rem;
    }

    h2::before {
      content: '';
      display: block;
      width: 3px;
      height: 1em;
      background: var(--grad);
      border-radius: 2px;
      flex-shrink: 0;
    }

    .sh h2 {
      margin-bottom: 0
    }

    /* ── Hero ── */
    .hero {
      padding-block: 4.5rem 3.5rem
    }

    .hero-grid {
      display: grid;
      grid-template-columns: 1fr 200px;
      gap: 2.5rem;
      align-items: center
    }

    .hero-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: var(--mono);
      font-size: .64rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--a1);
      background: rgba(59, 130, 246, .08);
      border: 1px solid rgba(59, 130, 246, .2);
      padding: 3px 10px;
      border-radius: 100px;
      margin-bottom: 1rem;
    }

    .hero-tag::before {
      content: '';
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--grn);
      box-shadow: 0 0 6px var(--grn);
      animation: blink 2s ease infinite;
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: .3
      }
    }

    h1 {
      font-size: clamp(1.85rem, 4.5vw, 2.9rem);
      font-weight: 800;
      letter-spacing: -.04em;
      line-height: 1.08;
      margin-bottom: .9rem;
    }

    h1 .g {
      background: var(--grad);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text
    }

    .hero-desc {
      color: var(--sub);
      font-size: .9rem;
      line-height: 1.75;
      max-width: 440px;
      margin-bottom: 1.5rem
    }

    .btns {
      display: flex;
      gap: .6rem;
      flex-wrap: wrap
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: .8rem;
      font-weight: 600;
      padding: 9px 20px;
      border-radius: var(--r);
      border: none;
      transition: all .2s;
      text-decoration: none;
      line-height: 1;
      white-space: nowrap;
      letter-spacing: .01em;
    }

    .btn-p {
      background: var(--a1);
      color: #fff
    }

    .btn-p:hover {
      opacity: .88;
      color: #fff;
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(59, 130, 246, .2)
    }

    .btn-s {
      background: var(--s1);
      color: var(--sub);
      border: 1px solid var(--bd)
    }

    .btn-s:hover {
      background: var(--s2);
      border-color: var(--bdhi);
      color: var(--txt);
      transform: translateY(-1px)
    }

    /* Device image */
    .device-wrap {
      position: relative
    }

    .device-wrap::after {
      content: '';
      position: absolute;
      inset: -20% 0;
      background: radial-gradient(circle, rgba(59, 130, 246, .1) 0%, transparent 70%);
      filter: blur(18px);
      pointer-events: none;
    }

    .device-img {
      position: relative;
      z-index: 1;
      animation: float 5s ease-in-out infinite;
      filter: drop-shadow(0 20px 40px rgba(0, 0, 0, .55));
    }

    @keyframes float {

      0%,
      100% {
        transform: translateY(0)
      }

      50% {
        transform: translateY(-10px)
      }
    }

    /* ── Notes ── */
    .notes {
      display: flex;
      flex-direction: column;
      gap: .45rem
    }

    .note {
      display: flex;
      align-items: flex-start;
      gap: .65rem;
      padding: .7rem 1rem;
      border-radius: var(--r);
      font-size: .82rem;
      line-height: 1.6;
      border-left: 3px solid;
    }

    .note-icon {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .6rem;
      font-weight: 800;
      flex-shrink: 0;
      margin-top: 1px;
      letter-spacing: 0;
    }

    .note.warning {
      background: rgba(245, 158, 11, .06);
      border-color: var(--ylw);
      color: #c8992a;
    }

    .note.warning .note-icon {
      background: rgba(245, 158, 11, .15);
      color: var(--ylw)
    }

    .note.info {
      background: rgba(59, 130, 246, .06);
      border-color: var(--a1);
      color: #698ab8;
    }

    .note.info .note-icon {
      background: rgba(59, 130, 246, .15);
      color: var(--a1)
    }

    /* ── Screenshots ── */
    .ss-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: .75rem;
    }

    .ss-btn {
      background: var(--s1);
      border: 1px solid var(--bd);
      border-radius: var(--rl);
      overflow: hidden;
      cursor: pointer;
      transition: transform .2s, border-color .2s, box-shadow .2s;
      padding: 0;
      text-align: center;
    }

    .ss-btn:hover {
      transform: translateY(-3px) scale(1.02);
      border-color: var(--bdhi);
      box-shadow: 0 10px 28px rgba(0, 0, 0, .45);
    }

    .ss-btn img {
      width: 100%;
      aspect-ratio: 9/19;
      object-fit: cover;
      pointer-events: none
    }

    .ss-label {
      font-size: .67rem;
      color: var(--mut);
      padding: 6px 4px;
      font-weight: 500;
      display: block
    }

    /* ── Downloads ── */
    .dl-list {
      display: flex;
      flex-direction: column;
      gap: .45rem
    }

    .dl-row {
      display: flex;
      align-items: center;
      gap: 1rem;
      background: var(--s1);
      border: 1px solid var(--bd);
      border-radius: var(--r);
      padding: .85rem 1.1rem;
      transition: border-color .2s, background .2s;
    }

    .dl-row:hover {
      border-color: var(--bdhi);
      background: var(--s2)
    }

    .dl-row.latest {
      border-color: rgba(59, 130, 246, .3);
      background: linear-gradient(90deg, rgb(59 130 246 / .05), var(--s1) 55%)
    }

    .dl-info {
      flex: 1;
      min-width: 0
    }

    .dl-ver {
      display: flex;
      align-items: center;
      gap: .5rem;
      font-weight: 700;
      font-family: var(--mono);
      font-size: .85rem;
      margin-bottom: 2px;
    }

    .latest-txt {
      font-size: .7rem;
      color: var(--a1);
      font-weight: 600;
      font-family: inherit;
      letter-spacing: .02em
    }

    .dl-meta {
      font-size: .75rem;
      color: var(--mut)
    }

    .dl-right {
      display: flex;
      align-items: center;
      gap: .75rem;
      flex-shrink: 0
    }

    .dl-size {
      font-family: var(--mono);
      font-size: .7rem;
      color: var(--mut)
    }

    .btn-dl {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: .76rem;
      font-weight: 600;
      padding: 7px 15px;
      border-radius: 6px;
      border: 1px solid var(--bd);
      background: transparent;
      color: var(--sub);
      white-space: nowrap;
      transition: all .2s;
      text-decoration: none;
    }

    .btn-dl:hover {
      background: var(--a1);
      border-color: transparent;
      color: #fff;
      transform: translateY(-1px)
    }

    .dl-row.latest .btn-dl {
      background: var(--a1);
      border-color: transparent;
      color: #fff
    }

    .dl-row.latest .btn-dl:hover {
      opacity: .85
    }

    /* ── Maintainer ── */
    .maint {
      display: inline-flex;
      align-items: center;
      gap: 1.25rem;
      background: var(--s1);
      border: 1px solid var(--bd);
      border-radius: var(--rxl);
      padding: 1.4rem;
      max-width: 100%;
    }

    .avatar {
      width: 58px;
      height: 58px;
      border-radius: 50%;
      background: var(--grad);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, .2);
      overflow: hidden;
    }

    .avatar:has(img) {
      background: none;
      border: none;
      box-shadow: none;
      border-radius: 0;
      overflow: visible;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      padding: 0;
      /* filter: brightness(0) invert(1); */
    }

    .m-name {
      font-size: .92rem;
      font-weight: 700;
      margin-bottom: 2px
    }

    .m-role {
      font-size: .71rem;
      color: var(--mut);
      margin-bottom: .65rem
    }

    .socs {
      display: flex;
      gap: .4rem;
      flex-wrap: wrap
    }

    .soc {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: .71rem;
      font-weight: 500;
      padding: 4px 10px;
      border-radius: 6px;
      background: var(--s2);
      border: 1px solid var(--bd);
      color: var(--sub);
      transition: all .15s;
    }

    .soc:hover {
      border-color: var(--a1);
      color: var(--a1)
    }

    /* ── Support ── */
    .sup-list {
      display: flex;
      flex-wrap: wrap;
      gap: .6rem
    }

    .sup-a {
      display: flex;
      align-items: center;
      gap: .75rem;
      background: var(--s1);
      border: 1px solid var(--bd);
      border-radius: var(--r);
      padding: .8rem 1.1rem;
      color: var(--txt);
      transition: all .2s;
      min-width: 155px;
    }

    .sup-a:hover {
      border-color: var(--bdhi);
      background: var(--s2);
      color: var(--txt);
      transform: translateY(-1px)
    }

    .sup-ico {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      background: var(--s2);
      border: 1px solid var(--bd);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0
    }

    .sup-ico svg {
      width: 14px;
      height: 14px
    }

    .sup-name {
      display: block;
      font-size: .8rem;
      font-weight: 600
    }

    .sup-desc {
      display: block;
      font-size: .7rem;
      color: var(--mut)
    }

    /* ── Collapsible panels (changelog / install) ── */
    .panel {
      background: var(--s0);
      border: 1px solid var(--bd);
      border-radius: var(--rl);
      overflow: hidden;
      transition: border-color .3s;
      will-change: height;
      overflow-anchor: none;
    }

    .panel.animating {
      pointer-events: none;
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.25rem;
      cursor: pointer;
      user-select: none;
      transition: background .15s;
    }

    .panel-head:hover {
      background: var(--s1)
    }

    .panel-title {
      font-size: .9rem;
      font-weight: 700;
      color: var(--txt);
      display: flex;
      align-items: center;
      gap: .5rem
    }

    .panel-title::before {
      content: '';
      display: block;
      width: 3px;
      height: 1em;
      background: var(--grad);
      border-radius: 2px;
    }

    .panel-arrow {
      color: var(--mut);
      transition: transform .3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      align-items: center;
      justify-content: center;
      width: 20px;
      height: 20px;
    }

    .panel[open] .panel-arrow {
      transform: rotate(180deg);
      color: var(--a1);
    }

    .panel-body {
      padding: 0 1.25rem 1.25rem;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(-4px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    /* ── Markdown ── */
    .md {
      color: var(--sub);
      line-height: 1.8
    }

    .md h1 {
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--txt);
      margin-bottom: .5em
    }

    .md h2 {
      font-size: .95rem;
      font-weight: 700;
      color: var(--txt);
      padding-bottom: .3em;
      border-bottom: 1px solid var(--bd);
      margin-top: 1.6em;
      margin-bottom: .5em;
      display: block;
      /* override the ::before pseudo-element from global h2 */
    }

    .md h2::before {
      display: none
    }

    .md h3 {
      font-size: .88rem;
      font-weight: 600;
      color: var(--sub);
      margin-top: 1.25em;
      margin-bottom: .4em
    }

    .md p {
      margin-bottom: .75em
    }

    .md ul,
    .md ol {
      padding-left: 1.4em;
      margin-bottom: .75em
    }

    .md li {
      margin-bottom: .2em
    }

    .md strong {
      color: var(--txt);
      font-weight: 600
    }

    .md code {
      font-family: var(--mono);
      font-size: .82em;
      background: var(--s2);
      border: 1px solid var(--bd);
      color: #7dd3fc;
      padding: 1px 6px;
      border-radius: 4px
    }

    .md pre {
      background: var(--s2);
      border: 1px solid var(--bd);
      border-radius: var(--r);
      padding: 1rem;
      overflow-x: auto;
      margin-bottom: .75em
    }

    .md pre code {
      background: none;
      border: none;
      padding: 0;
      color: #7dd3fc;
      font-size: .8rem
    }

    .md blockquote {
      border-left: 3px solid var(--ylw);
      background: rgba(245, 158, 11, .05);
      color: #b8892a;
      padding: .5rem .85rem;
      border-radius: 0 4px 4px 0;
      margin-bottom: .75em
    }

    .md blockquote p {
      margin: 0
    }

    .md hr {
      border: none;
      border-top: 1px solid var(--bd);
      margin: 1.25em 0
    }

    .md del {
      text-decoration: line-through;
      color: var(--mut)
    }

    .md a {
      color: var(--a1);
      text-decoration: underline;
      text-underline-offset: 2px
    }

    /* ── Toggle button (legacy, replaced by panel but kept for safety) ── */
    .tog {
      font-size: .72rem;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 6px;
      background: var(--s1);
      border: 1px solid var(--bd);
      color: var(--mut);
      transition: all .15s;
    }

    .tog:hover,
    .tog[aria-expanded="true"] {
      border-color: var(--a1);
      color: var(--a1);
      background: rgba(59, 130, 246, .08)
    }

    /* ── Lightbox ── */
    .lb-wrap {

      align-items: center;
      justify-content: center;

      max-height: 90dvh
    }

    .lb-img {
      max-width: 100%;

    }

    .lb-cap {

    }

    .lb-close {
      position: absolute;
      top: 16px;
      right: 16px;
      font-size: .85rem;
      z-index: 1
    }

    /* ── Footer ── */
    footer {
      border-top: 1px solid var(--bd);
      padding-block: 1.5rem;
      background: var(--s0)
    }

    .ft {

    }

    /* ── Responsive ── */
    @media (max-width: 860px) {
      .hero-grid {
        grid-template-columns: 1fr;
        text-align: center
      }

      .hero-desc,
      .btns,
      .hero-tag {
        margin-inline: auto
      }

      .btns {
        justify-content: center
      }

      .device-wrap {
        width: clamp(140px, 40vw, 190px);
        margin-inline: auto;

      }

      nav.desk {
        display: none
      }

      .ham {
        display: flex
      }

      .maint {

      }
    }

    @media (max-width: 640px) {
      .wrap {
        padding-inline: 1rem
      }

      .sec {
        padding-block: 2.75rem
      }

      .ss-grid {
        grid-template-columns: repeat(2, 1fr)
      }

      .dl-row {
        flex-wrap: wrap
      }

      .dl-right {
        width: 100%;

      }

      .sup-a {
        min-width: calc(50% - .3rem)
      }

      .maint {
        flex-direction: column;
        gap: .85rem;
        text-align: center
      }

      .socs {
        justify-content: center
      }
    }

    @media (max-width: 400px) {
      h1 {
        font-size: 1.7rem
      }

      .ss-grid {
        grid-template-columns: repeat(2, 1fr)
      }

      .sup-a {
        min-width: 100%
      }
    }

    /* ── Confirmation Popup ── */
    .conf-wrap {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 400;
      background: rgba(0, 0, 0, .85);
      backdrop-filter: blur(8px);
      align-items: center;
      justify-content: center;

    }

    .conf-wrap.open {

    }

    .conf-box {
      background: var(--s1);
      border: 1px solid var(--bdhi);

      padding: 2.25rem;
      max-width: 420px;

    }

    @keyframes confIn {
      from {
        opacity: 0;
        transform: scale(.9) translateY(10px);
      }

      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    .conf-title {
      font-size: 1.25rem;

      color: var(--txt);

    }

    .conf-msg {

    .conf-btns {

    .btn-conf {

</head>

  <script>
    /* ════════════════════════════════════════════════════
       CONFIG — Edit this block only. No code changes needed.
    ════════════════════════════════════════════════════ */
    const CONFIG = {

      /* Basic */
      rom: 'LineageOS',
      device: 'Redmi Note 11 / NFC',
      status: 'Stable',
      description: 'A clean Android experience focused on privacy and stability',

      /* Maintainer */
      maintainer: {
        name: 'Starstream',
        role: 'Maintainer',
        avatar: 'src/owner.svg',   // image URL or leave empty for initials
        telegram: 'https://t.me/Iron_hide23',
        github: 'https://github.com/Shaddowalker-26',
      },

      /* Screenshots — files in src/img/screenshots/, shown A→Z */
      screenshots: [
        '1.png',
        '2.png',
        '3.png',
        '4.png',
      ],

      /* Downloads — newest first, first entry = Latest */
      downloads: [
        {
          rom_version: '1.3',
          android_version: '16',
          size: '840 MB',
          date: '21 March 2026',
          download_link: 'placeholder url',
        },
        {
          rom_version: '1.2',
          android_version: '16',
          size: '830 MB',
          date: '20 March 2026',
          download_link: 'placeholder url',
        },
        {
          rom_version: '1.0',
          android_version: '16',
          size: '780 MB',
          date: '19 March 2026',
          download_link: 'placeholder url',
        },
      ],

      /* Notes — type: 'warning' | 'info' */
      notes: [
        { type: 'info', text: 'Only flash recommended gapps' },
        { type: 'info', text: 'Always take a full backup of your entire device' },
        { type: 'warning', text: 'Be patient and follow instructions carefully – Rushing is the fastest way to make mistakes' },
      ],

      /* Support links */
      support: [
        { label: 'Group', desc: 'Rom support ', url: 'https://t.me/lineagesup' },
        { label: 'Group', desc: 'Global community', url: 'https://t.me/RedmiNote11_Community' },
      ],

      /* Changelog — standard markdown */
      changelog: `
## 21 March 2026 - v1.2 -  Android 16
- a
- b
- c

---

## 20 March 2026 - v1.1 -  Android 16
- a
- b
- c

---

## 19 March 2026 - v1.0 -  Android 16
- a
- b
- c
  `.trim(),

      /* Installation guide — standard markdown */
      install: `
## Before You Start:
- Always back up your important data
- Use the recommended recovery
---

## Clean Flash:
- Follow step 1
- Follow step 2
- Follow step 3
---

## Dirty Flash:
- Follow step 1
- Follow step 2
- Follow step 3

## Flash Kernel:
- Follow step 1
- Follow step 2
- Follow step 3

## Notes:
- Since there's no dedicated recovery partition, you must flash recovery every time after flashing the ROM
- After the dirty flash your root/kernel will be overwritten. So, take a backup of your favourite kernel
- If you face any bug or issues, politely report them with logs into the device support group


  `.trim(),

    };
    /* ════════════════════════════════════════════════════
       RENDERER — No edits needed below this line.
    ════════════════════════════════════════════════════ */

    document.addEventListener('DOMContentLoaded', () => {
      progressBar();
      mobileNav();
      render();
      initDownloadConfirmation();
      initAccordions();
    });

    function initAccordions() {
      const panels = document.querySelectorAll('.panel');
      panels.forEach(panel => {
        const summary = panel.querySelector('.panel-head');

        summary.addEventListener('click', (e) => {
          e.preventDefault();
          if (panel.classList.contains('animating')) return;

          const isOpen = panel.hasAttribute('open');

          if (isOpen) {
            // Close
            const startHeight = panel.offsetHeight;
            const endHeight = summary.offsetHeight;

            panel.classList.add('animating');
            panel.style.height = `${startHeight}px`;

            // Refined easing and slight duration tweak
            const anim = panel.animate([
              { height: `${startHeight}px`, opacity: 1 },
              { height: `${endHeight}px`, opacity: 0.95 }
            ], {
              duration: 300,
              easing: 'cubic-bezier(0.33, 1, 0.68, 1)'
            });

            anim.onfinish = () => {
              panel.removeAttribute('open');
              panel.classList.remove('animating');
              panel.style.height = '';
            };
          } else {
            // Open
            const startHeight = summary.offsetHeight;
            panel.style.height = `${startHeight}px`;
            panel.setAttribute('open', '');
            const endHeight = panel.scrollHeight; // use scrollHeight for accuracy

            panel.classList.add('animating');

            const anim = panel.animate([
              { height: `${startHeight}px`, opacity: 0.95 },
              { height: `${endHeight}px`, opacity: 1 }
            ], {
              duration: 400, // slightly longer for opening
              easing: 'cubic-bezier(0.33, 1, 0.68, 1)'
            });

            anim.onfinish = () => {
              panel.classList.remove('animating');
              panel.style.height = '';
            };
          }
        });
      });
    }

    function initDownloadConfirmation() {
      const conf = $('conf');
      const confirmBtn = $('conf-confirm');
      const cancelBtn = $('conf-cancel');
      let currentUrl = '';

      // Intercept clicks on .btn-dl
      document.addEventListener('click', (e) => {
        const btn = e.target.closest('.btn-dl');
        if (btn) {
          e.preventDefault();
          currentUrl = btn.href;
          conf.classList.add('open');
          document.body.style.overflow = 'hidden';
        }
      });

      const close = () => {
        conf.classList.remove('open');
        document.body.style.overflow = '';
      };

      confirmBtn.addEventListener('click', () => {
        if (currentUrl) {
          window.open(currentUrl, '_blank', 'noopener,noreferrer');
        }
        close();
      });

      cancelBtn.addEventListener('click', close);
      conf.addEventListener('click', (e) => { if (e.target === conf) close(); });

      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && conf.classList.contains('open')) close();
      });
    }

    function render() {
      const C = CONFIG;
      set('hero-badge', `${C.status} · ${C.rom}`);
      set('h-rom', C.rom);
      set('h-dev', `for ${C.device}`);
      set('h-desc', C.description);

      renderNotes(C.notes);
      renderScreenshots(C.screenshots);
      renderDownloads(C.downloads);
      renderMaintainer(C.maintainer);
      renderSupport(C.support);

      md('cl-md', C.changelog);
      md('in-md', C.install);

      set('f-copy', `\u00A9 ${new Date().getFullYear()} STARSTREAM`);
    }

    /* Notes */
    function renderNotes(list) {
      const el = $('notes-list');
      if (!el || !list.length) { $('notes')?.setAttribute('hidden', ''); return }
      const w = { warning: '!', info: 'i' };
      el.innerHTML = list.map(n =>
        `<div class="note ${x(n.type)}" role="${n.type === 'warning' ? 'alert' : 'note'}">
       <span class="note-icon" aria-hidden="true">${w[n.type] || 'i'}</span>
       <span>${x(n.text)}</span>
     </div>`
      ).join('');
    }

    /* Screenshots */
    function renderScreenshots(files) {
      const el = $('ss-grid');
      if (!el || !files.length) { $('screenshots')?.setAttribute('hidden', ''); return }
      const shots = [...files].sort((a, b) => a.localeCompare(b)).map(f => ({
        file: `src/screenshots/${f}`,
        label: f.replace(/\.[^.]+$/, '').replace(/[-_]/g, ' ').replace(/\b\w/g, c => c.toUpperCase()),
      }));
      el.innerHTML = shots.map((s, i) =>
        `<button class="ss-btn" data-i="${i}" type="button" aria-label="View ${xa(s.label)}">
       <img src="${xa(s.file)}" alt="${xa(s.label)}" loading="lazy" />
       <span class="ss-label">${x(s.label)}</span>
     </button>`
      ).join('');
      initLightbox(shots);
    }

    /* Downloads */
    function renderDownloads(list) {
      const el = $('dl-list');
      const sub = $('dl-sub');
      if (!el) return;
      if (!list.length) { el.innerHTML = '<p style="color:var(--mut);font-size:.85rem">No builds available</p>'; return }
      if (sub) sub.textContent = `${list.length} build${list.length > 1 ? 's' : ''} available`;
      el.innerHTML = list.map((d, i) => {
        const latest = i === 0;
        return `
      <div class="dl-row${latest ? ' latest' : ''}">
        <div class="dl-info">
          <div class="dl-ver">
            v${x(d.rom_version)}
            ${latest ? `<span class="latest-txt">Latest</span>` : ''}
          </div>
          <div class="dl-meta">Android ${x(d.android_version)} &nbsp;&middot;&nbsp; ${x(d.date)}</div>
        </div>
        <div class="dl-right">
          <span class="dl-size">${x(d.size)}</span>
          <a href="${xa(d.download_link)}" class="btn-dl"
             target="_blank" rel="noopener noreferrer">Download</a>
        </div>
      </div>`;
      }).join('');
    }

    /* Maintainer */
    function renderMaintainer(m) {
      const el = $('maint');
      if (!el || !m?.name) { $('maintainer')?.setAttribute('hidden', ''); return }
      const initials = m.name.split(' ').map(w => w[0]).slice(0, 2).join('');
      const av = m.avatar ? `<img src="${xa(m.avatar)}" alt="${xa(m.name)}" style="cursor:zoom-in" />` : x(initials);
      const links = [
        { k: 'telegram', l: 'Telegram' },
        { k: 'github', l: 'GitHub' },
        { k: 'xda', l: 'XDA' },
      ].filter(s => m[s.k]).map(s =>
        `<a href="${xa(m[s.k])}" class="soc" target="_blank" rel="noopener noreferrer">${s.l}</a>`
      ).join('');
      el.innerHTML = `
    <div class="avatar" aria-hidden="true">${av}</div>
    <div>
      <div class="m-name">${x(m.name)}</div>
      <div class="m-role">${x(m.role || 'Device Maintainer')}</div>
      <div class="socs">${links}</div>
    </div>`;
    }

    /* Support */
    function renderSupport(list) {
      const el = $('sup-list');
      if (!el || !list.length) { $('support')?.setAttribute('hidden', ''); return }
      el.innerHTML = list.map(s =>
        `<a href="${xa(s.url)}" class="sup-a" target="_blank" rel="noopener noreferrer">
       <span class="sup-ico" aria-hidden="true">
         <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--sub)">
           <path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/>
           <path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/>
         </svg>
       </span>
       <span>
         <span class="sup-name">${x(s.label)}</span>
         <span class="sup-desc">${x(s.desc)}</span>
       </span>
     </a>`
      ).join('');
    }

    /* Markdown */
    function md(targetId, text) {
      const el = $(targetId);
      if (el) el.innerHTML = parseMd(text || '');
    }
    function parseMd(text) {
      const lines = text.split('\n'), out = [];
      let i = 0;
      while (i < lines.length) {
        const ln = lines[i];
        if (/^(`{3}|~{3})/.test(ln)) {
          const f = ln.match(/^(`{3}|~{3})/)[0], lang = ln.slice(f.length).trim(), code = [];
          i++;
          while (i < lines.length && !lines[i].startsWith(f)) code.push(x(lines[i++]));
          out.push(`<pre><code${lang ? ` class="language-${xa(lang)}"` : ''
            }>${code.join('\n')}</code></pre>`);
          i++; continue;
        }
        const hm = ln.match(/^(#{1,6})\s+(.+)/);
        if (hm) { out.push(`<h${hm[1].length}>${il(hm[2])}</h${hm[1].length}>`); i++; continue }
        if (/^(\*{3,}|-{3,}|_{3,})\s*$/.test(ln)) { out.push('<hr />'); i++; continue }
        if (ln.startsWith('> ')) {
          const bq = [];
          while (i < lines.length && lines[i].startsWith('> ')) bq.push(il(lines[i++].slice(2)));
          out.push(`<blockquote><p>${bq.join('<br>')}</p></blockquote>`); continue;
        }
        if (/^[*\-+]\s/.test(ln)) {
          const it = [];
          while (i < lines.length && /^[*\-+]\s/.test(lines[i])) it.push(`<li>${il(lines[i++].slice(2))}</li>`);
          out.push(`<ul>${it.join('')}</ul>`); continue;
        }
        if (/^\d+\.\s/.test(ln)) {
          const it = [];
          while (i < lines.length && /^\d+\.\s/.test(lines[i]))
            it.push(`<li>${il(lines[i++].replace(/^\d+\.\s/, ''))}</li>`);
          out.push(`<ol>${it.join('')}</ol>`); continue;
        }
        if (!ln.trim()) { i++; continue }
        const p = [];
        while (i < lines.length && lines[i].trim() &&
          !/^#{1,6}\s/.test(lines[i]) && !/^(`{3}|~{3})/.test(lines[i]))
          p.push(il(lines[i++]));
        out.push(`<p>${p.join('<br>')}</p>`);
      }
      return out.join('\n');
    }
    function il(t) {
      return t
        .replace(/`([^`]+)`/g, (_, c) => `<code>${x(c)}</code>`)
        .replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/__(.+?)__/g, '<strong>$1</strong>')
        .replace(/\*(.+?)\*/g, '<em>$1</em>')
        .replace(/_(.+?)_/g, '<em>$1</em>')
        .replace(/~~(.+?)~~/g, '<del>$1</del>')
        .replace(/\[([^\]]+)\]\(([^)]+)\)/g,
          (_, l, u) => `<a href="${xa(u)}" target="_blank" rel="noopener noreferrer">${x(l)}</a>`)
        .replace(/(https?:\/\/[^\s<>"]+)/g,
          u => `<a href="${xa(u)}" target="_blank" rel="noopener noreferrer">${x(u)}</a>`);
    }

    /* Lightbox */
    function initLightbox(shots) {
      const lb = $('lb');
      const img = $('lb-img'), cap = $('lb-cap');
      const cls = $('lb-close'), prv = $('lb-prev'), nxt = $('lb-next');
      if (!lb) return;
      let idx = 0;
      function open(n) {
        idx = (n + shots.length) % shots.length;
        img.src = shots[idx].file; img.alt = shots[idx].label;
        cap.textContent = shots[idx].label;
        lb.classList.add('open');
        document.body.style.overflow = 'hidden';
        prv.style.display = shots.length > 1 ? '' : 'none';
        nxt.style.display = shots.length > 1 ? '' : 'none';
        cls.focus();
      }
      function close() {
        lb.classList.remove('open');
        document.body.style.overflow = '';
      }
      $('ss-grid')?.addEventListener('click', e => {
        const b = e.target.closest('.ss-btn');
        if (b) open(+b.dataset.i);
      });
      // Handler for avatar
      $('maint')?.addEventListener('click', e => {
        const av = e.target.closest('.avatar img');
        if (av) {
          img.src = av.src;
          img.alt = av.alt;
          cap.textContent = 'OUR BELOVED STARSTREAM';
          lb.classList.add('open');
          document.body.style.overflow = 'hidden';
          prv.style.display = 'none';
          nxt.style.display = 'none';
          cls.focus();
        }
      });
      cls?.addEventListener('click', close);
      prv?.addEventListener('click', () => open(idx - 1));
      nxt?.addEventListener('click', () => open(idx + 1));
      lb.addEventListener('click', e => { if (e.target === lb) close() });
      document.addEventListener('keydown', e => {
        if (!lb.classList.contains('open')) return;
        if (e.key === 'Escape') close();
        if (e.key === 'ArrowLeft' && shots.length > 1) open(idx - 1);
        if (e.key === 'ArrowRight' && shots.length > 1) open(idx + 1);
      });
    }

    /* Mobile nav */
    function mobileNav() {
      const btn = $('ham'), nav = $('mob');
      if (!btn || !nav) return;
      btn.addEventListener('click', () => {
        const isOpen = btn.classList.toggle('open');
        btn.setAttribute('aria-expanded', String(isOpen));
        nav.classList.toggle('open', isOpen);
      });
      nav.querySelectorAll('a').forEach(a => a.addEventListener('click', () => {
        btn.classList.remove('open');
        btn.setAttribute('aria-expanded', 'false');
        nav.classList.remove('open');
      }));
    }

    /* Scroll progress */
    function progressBar() {
      const bar = $('progress');
      window.addEventListener('scroll', () => {
        const max = document.documentElement.scrollHeight - window.innerHeight;
        if (bar) bar.style.width = max > 0 ? `${(scrollY / max) * 100}%` : '0%';
      }, { passive: true });
    }

    /* Helpers */
    const $ = id => document.getElementById(id);
    const set = (id, v) => { const e = $(id); if (e) e.textContent = v };
    const x = s => typeof s === 'string' ? s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;') : '';
    const xa = s => typeof s === 'string' ? s.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/'/g, '&#39;') : '';
  </script>
